# Salvaged and normalized from master archive source: evaluation_config_starter.yaml
# Status: example-only, not wired into runtime.
# Purpose: preserve config / coefficient / variant structure for later promotion under current repo architecture.

version: "0.1-draft"
project: "NVDA Evaluator v5"
profile: "local_post_run_review"

paths:
  runtime_db_path: "./db/market_snapshots.db"
  signal_score_db_path: "./db/signal_scores.db"
  logs_dir: "./logs"
  output_dir: "./evaluator/outputs"
  module_registry_path: "./config/module_registry.yaml"
  coefficients_registry_path: "./config/coefficients_registry.yaml"
  strategy_variants_path: "./config/strategy_variants.yaml"

scope:
  evaluation_mode: "post_run"
  include_runtime_layers:
    - "layer1_signals"
    - "layer2_scoring"
    - "layer3_decision"
    - "layer4_execution"
  include_position_layers_when_available: true
  include_supervisory_layers_when_available: true

date_range:
  start_date: "2025-04-01"
  end_date: "2025-04-30"
  timezone: "America/New_York"

variants:
  mode: "all"
  include:
    - "baseline"
  exclude: []
  compare_against: "baseline"

inputs:
  require_trade_log: true
  require_signal_outputs: true
  require_score_breakdown: true
  require_macro_snapshots: true
  require_execution_logs: true
  optional_inputs:
    - "position_book"
    - "profit_loss_ledger"
    - "module_trace_attribution"
    - "variant_trace"

metrics:
  pnl:
    enabled: true
    fields:
      - "gross_pnl"
      - "net_pnl"
      - "avg_trade_pnl"
      - "max_drawdown"
  hit_rate:
    enabled: true
  risk_adjusted:
    enabled: true
    metrics:
      - "profit_factor"
      - "expectancy"
  confidence_divergence:
    enabled: true
  signal_conflicts:
    enabled: true
  macro_alignment:
    enabled: true
  module_attribution:
    enabled: true

thresholds:
  high_confidence_cutoff: 0.75
  medium_confidence_cutoff: 0.50
  conflict_score_cutoff: 0.50
  anomaly_pnl_sigma: 2.0

reports:
  write_summary_md: true
  write_variant_leaderboard_csv: true
  write_module_attribution_csv: true
  write_conflict_log_md: true
  write_macro_alignment_md: true
  write_flagged_trades_csv: true

orchestration:
  run_module_score_attributor: true
  run_signal_conflict_detector: true
  run_macro_alignment_checker: true
  run_variant_performance_tracker: true
  run_confidence_divergence_logger: true
  run_feedback_summary_writer: true

filters:
  min_trade_count: 1
  min_signal_count: 1
  include_no_trade_runs: true
  exclude_days_with_missing_core_data: false

human_review:
  required: true
  auto_apply_runtime_changes: false
  review_fields:
    - "variant_leaderboard"
    - "module_scores"
    - "confidence_failures"
    - "signal_conflicts"
    - "macro_alignment_report"

notes:
  - "Evaluator is post-run and does not directly modify runtime settings."
  - "Use this as a starter config and tighten requirements as Layers 5-10 are completed."
