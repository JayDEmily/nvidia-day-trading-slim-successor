schema_version: "coefficient_authority.v1"
authority_version: "2026-03-31.tranche1"
notes:
  - "Gate 123 typed authority surface for the admitted tranche-one coefficient universe."
  - "The governed file is narrower than the salvage coefficients registry on purpose."
  - "Mutable runtime surfaces activate in Gate 124; temporal thresholds and timing parameters activate in Gate 126."

mutable_numeric_surfaces:
  - surface_id: "entry_gate_score_floor"
    owner_stage: "eligibility"
    units: "score_fraction_0_to_1"
    bound_class: "score_threshold"
    asymmetry: "narrow_bidirectional"
    baseline: 0.65
    minimum: 0.50
    maximum: 0.85
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["clock_envelope", "event_window_state", "signal_conflict_state", "permission_state"]
    activation_gate: "Gate 124"
    notes:
      - "Eligibility floor stays inside score space rather than free-form optimisation space."
  - surface_id: "zone_score_threshold"
    owner_stage: "eligibility"
    units: "score_fraction_0_to_1"
    bound_class: "score_threshold"
    asymmetry: "narrow_bidirectional"
    baseline: 0.50
    minimum: 0.35
    maximum: 0.80
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["clock_envelope", "dealer_pressure_state", "signal_conflict_state", "permission_state"]
    activation_gate: "Gate 124"
  - surface_id: "distance_to_vwap_soft_limit_pct"
    owner_stage: "execution"
    units: "percent"
    bound_class: "one_sided_clamp"
    asymmetry: "narrow_bidirectional"
    baseline: 1.50
    minimum: 0.40
    maximum: 3.00
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["clock_envelope", "gamma_state", "dealer_pressure_state", "options_behavior_cluster"]
    activation_gate: "Gate 124"
  - surface_id: "risk_vix_caution_threshold"
    owner_stage: "posture"
    units: "volatility_index_points"
    bound_class: "score_threshold"
    asymmetry: "narrow_bidirectional"
    baseline: 24.0
    minimum: 18.0
    maximum: 40.0
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["volatility_regime", "event_window_state", "signal_conflict_state"]
    activation_gate: "Gate 124"
  - surface_id: "risk_vix_hot_threshold"
    owner_stage: "posture"
    units: "volatility_index_points"
    bound_class: "score_threshold"
    asymmetry: "narrow_bidirectional"
    baseline: 32.0
    minimum: 24.0
    maximum: 50.0
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["volatility_regime", "event_window_state", "signal_conflict_state"]
    activation_gate: "Gate 124"
  - surface_id: "max_risk_per_trade"
    owner_stage: "execution"
    units: "percent"
    bound_class: "one_sided_clamp"
    asymmetry: "downward_friendly"
    baseline: 0.35
    minimum: 0.10
    maximum: 0.55
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["inventory_posture_state", "fresh_vs_inventory_state", "permission_state", "gamma_state"]
    activation_gate: "Gate 124"
  - surface_id: "target_fresh_deployable_pct"
    owner_stage: "execution"
    units: "percent"
    bound_class: "one_sided_clamp"
    asymmetry: "downward_only"
    baseline: 55.0
    minimum: 0.0
    maximum: 55.0
    transform_family: "state_conditioned_modifier"
    allowed_upstream_drivers: ["inventory_posture_state", "fresh_vs_inventory_state", "permission_state", "capital_lockup_state"]
    activation_gate: "Gate 124"

mutable_boolean_surfaces:
  - surface_id: "hedge_required"
    owner_stage: "execution"
    units: "boolean_flag"
    bound_class: "boolean_requirement"
    asymmetry: "boolean_only"
    baseline: false
    transform_family: "boolean_override"
    allowed_upstream_drivers: ["gamma_state", "signal_conflict_state", "permission_state"]
    activation_gate: "Gate 124"

