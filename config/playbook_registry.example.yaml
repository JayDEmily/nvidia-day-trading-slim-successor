schema_version: playbook_registry.v1
registry_version: gate11-draft
notes:
- Checked-in typed playbook registry for Gates 11-13.
- Keeps stack and coefficient ownership outside the playbook registry.
execution_templates:
- template_id: continuation_ladder_exec
  entry_style: trend_ladder_3_step
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.2
  - 0.3
  - 0.5
  default_inventory_action: add
  default_fresh_capital_action: add
  thesis_invalidation_state: trend_structure_broken
  invalidation_reasons:
  - leadership_lost
  - breadth_rollover
  - state_break_below_ladder_anchor
  exit_reasons:
  - trim_into_extension
  - exit_on_breadth_reversal
- template_id: compression_breakout_exec
  entry_style: compression_release_ladder
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.3
  - 0.3
  - 0.4
  default_inventory_action: add
  default_fresh_capital_action: add
  thesis_invalidation_state: compression_failed_or_event_window_opened
  invalidation_reasons:
  - range_rejected
  - gamma_reaccelerates
  - event_window_opens
  exit_reasons:
  - trim_after_range_expansion
  - exit_if_breakout_fails_back_into_range
- template_id: pin_reversion_exec
  entry_style: pin_fade_scaler
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.5
  - 0.5
  default_inventory_action: trim
  default_fresh_capital_action: hold
  thesis_invalidation_state: pin_released_or_flow_reaccelerated
  invalidation_reasons:
  - pin_released
  - dealer_flow_reaccelerates
  - close_window_expires
  exit_reasons:
  - exit_on_pin_release
  - reduce_as_close_window_ends
- template_id: negative_gamma_flush_exec
  entry_style: probe_then_hedge
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.1
  - 0.15
  default_inventory_action: hedge
  default_fresh_capital_action: add
  thesis_invalidation_state: flush_accelerates_or_bounce_fails
  invalidation_reasons:
  - flush_makes_new_lows
  - vvix_spread_re-widens
  - bounce_never_confirms
  exit_reasons:
  - de-risk_into_bounce
  - exit_if_hostile_flush_reaccelerates
- template_id: front_expiry_pin_pressure_exec
  entry_style: front_pin_scaler
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.35
  - 0.65
  default_inventory_action: trim
  default_fresh_capital_action: hold
  thesis_invalidation_state: pin_build_failed_or_released
  invalidation_reasons:
  - pin_build_failed
  - dealer_flow_destabilises
  - expiry_window_rolls_off
  exit_reasons:
  - take_profit_into_pin
  - exit_on_pin_release
- template_id: term_structure_dislocation_exec
  entry_style: term_dislocation_probe
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.25
  - 0.35
  default_inventory_action: hold
  default_fresh_capital_action: add
  thesis_invalidation_state: term_structure_normalised
  invalidation_reasons:
  - term_structure_normalises
  - iv_curve_softens
  - dealer_pressure_flips
  exit_reasons:
  - reduce_into_curve_normalisation
  - exit_if_dislocation_fades
- template_id: skew_pressure_reversal_exec
  entry_style: skew_reversal_scaler
  watch_execution_style: watchlist
  scaling_step_factors:
  - 0.2
  - 0.3
  default_inventory_action: hedge
  default_fresh_capital_action: add
  thesis_invalidation_state: skew_reversal_failed
  invalidation_reasons:
  - skew_reversal_failed
  - dealer_pressure_reaccelerates
  - trend_confirmation_missing
  exit_reasons:
  - de_risk_as_skew_normalises
  - exit_if_reversal_fails
  hedge_exit_reason: remove_hedge_when_skew_normalises
playbooks:
- playbook_id: continuation_ladder
  notes:
  - Lead continuation family with additive ladder sizing.
  title: Continuation Ladder
  rule_id: continuation_ladder
  execution_template_id: continuation_ladder_exec
  priority: 1
  eligible:
    decision: eligible
    action_bias: add
    sizing_fraction: 0.35
    hedge_overlay: false
  watch_only:
    decision: watch_only
    action_bias: hold
    sizing_fraction: 0.0
    hedge_overlay: false
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
- playbook_id: compression_breakout
  notes:
  - Second-priority expansion family once compression confirms.
  title: Compression Breakout
  rule_id: compression_breakout
  execution_template_id: compression_breakout_exec
  priority: 2
  eligible:
    decision: eligible
    action_bias: add
    sizing_fraction: 0.25
    hedge_overlay: false
  watch_only:
    decision: watch_only
    action_bias: hold
    sizing_fraction: 0.0
    hedge_overlay: false
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
- playbook_id: pin_reversion
  notes:
  - Trim-biased pin fade around close and lunch windows.
  title: Pin Reversion
  rule_id: pin_reversion
  execution_template_id: pin_reversion_exec
  priority: 3
  eligible:
    decision: eligible
    action_bias: trim
    sizing_fraction: 0.2
    hedge_overlay: false
  watch_only:
    decision: watch_only
    action_bias: hold
    sizing_fraction: 0.0
    hedge_overlay: false
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
- playbook_id: negative_gamma_flush
  notes:
  - Probe-first hostile flush playbook with hedge overlay.
  title: Negative Gamma Flush
  rule_id: negative_gamma_flush
  execution_template_id: negative_gamma_flush_exec
  priority: 4
  eligible:
    decision: eligible
    action_bias: add
    sizing_fraction: 0.1
    hedge_overlay: true
  watch_only:
    decision: watch_only
    action_bias: hedge
    sizing_fraction: 0.0
    hedge_overlay: true
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
- playbook_id: front_expiry_pin_pressure
  notes:
  - Options-first family for front-expiry pin build, stability, and release management.
  title: Front Expiry Pin Pressure
  rule_id: front_expiry_pin_pressure
  execution_template_id: front_expiry_pin_pressure_exec
  priority: 5
  eligible:
    decision: eligible
    action_bias: trim
    sizing_fraction: 0.15
    hedge_overlay: false
  watch_only:
    decision: watch_only
    action_bias: hold
    sizing_fraction: 0.0
    hedge_overlay: false
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
- playbook_id: term_structure_dislocation
  notes:
  - Options-first family for front-versus-next expiry IV curve dislocation.
  title: Term Structure Dislocation
  rule_id: term_structure_dislocation
  execution_template_id: term_structure_dislocation_exec
  priority: 6
  eligible:
    decision: eligible
    action_bias: add
    sizing_fraction: 0.12
    hedge_overlay: false
  watch_only:
    decision: watch_only
    action_bias: hold
    sizing_fraction: 0.0
    hedge_overlay: false
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
- playbook_id: skew_pressure_reversal
  notes:
  - Options-first family for expanding skew tension that starts to reverse without
    a full flush cascade.
  title: Skew Pressure Reversal
  rule_id: skew_pressure_reversal
  execution_template_id: skew_pressure_reversal_exec
  priority: 7
  eligible:
    decision: eligible
    action_bias: hedge
    sizing_fraction: 0.1
    hedge_overlay: true
  watch_only:
    decision: watch_only
    action_bias: hedge
    sizing_fraction: 0.0
    hedge_overlay: true
  ineligible:
    decision: ineligible
    action_bias: reduce
    sizing_fraction: 0.0
    hedge_overlay: false
