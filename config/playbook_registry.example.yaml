families:
- family_id: trend_continuation
  title: Trend Continuation
  thesis: Persistent directional tape with supportive breadth and non-hostile options
    context.
  notes:
  - Top-level family for continuation and ladder-style deployment.
  active: true
- family_id: compression_release
  title: Compression Release
  thesis: Compressed tape or options surface releases into directional range expansion.
  notes:
  - Top-level family for compression breakout setups.
  active: true
- family_id: pin_behaviour
  title: Pin Behaviour
  thesis: 'Strike-magnet behaviour dominates and favours mean reversion or controlled
    trim. '
  notes:
  - Includes both generic pin reversion and front-expiry-specific pin pressure.
  active: true
- family_id: gamma_destabilisation
  title: Gamma Destabilisation
  thesis: Dealer pressure amplifies price movement and supports flush-style or hedge-led
    responses.
  notes:
  - Hostile negative-gamma conditions.
  active: true
- family_id: term_structure_dislocation
  title: Term Structure Dislocation
  thesis: Front-versus-next expiry dislocation distorts the curve and creates a normalisation
    setup.
  notes:
  - Options-first curve family.
  active: true
- family_id: skew_pressure_transition
  title: Skew Pressure Transition
  thesis: Skew pressure relaxes or reverses without a full destabilised flush.
  notes:
  - Options-first skew family.
  active: true
